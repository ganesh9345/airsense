<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense - AI Air Quality System</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0f1923;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: #1a2634 !important;
            border-bottom: 2px solid #00d4ff;
        }
        .navbar-brand {
            color: #00d4ff !important;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-link {
            color: #ffffff !important;
        }
        .nav-link:hover {
            color: #00d4ff !important;
        }
        .card {
            background: #1a2634;
            border: 1px solid #00d4ff33;
            border-radius: 15px;
        }
        .card-title {
            color: #00d4ff;
        }
        .btn-primary {
            background: #00d4ff;
            border: none;
            color: #0f1923;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: #00b8d9;
            color: #0f1923;
        }
        .aqi-good { color: #00e676; }
        .aqi-moderate { color: #ffeb3b; }
        .aqi-unhealthy { color: #ff9800; }
        .aqi-hazardous { color: #f44336; }
        .footer {
            background: #1a2634;
            border-top: 2px solid #00d4ff;
            padding: 20px;
            text-align: center;
            color: #00d4ff;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🌫️ AirSense</a>
            <button class="navbar-toggler" type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">🏠 Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard/">📊 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/subscribe/">🔔 Alerts</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p>🌍 AirSense — Predict. Alert. Protect. | Built with Django & AI</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
