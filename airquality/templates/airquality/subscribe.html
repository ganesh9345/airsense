{% extends 'airquality/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="card-title text-center">🔔 Subscribe to Air Quality Alerts</h4>
            <p style="color:#aaa; text-align:center;">
                Get email alerts when AQI crosses dangerous levels
            </p>
            <hr style="border-color:#00d4ff33;">

            <div class="mb-3">
                <label style="color:#aaa;">Your Email</label>
                <input type="email" id="emailInput"
                       class="form-control mt-1"
                       placeholder="you@example.com"
                       style="background:#0f1923; color:white; border:1px solid #00d4ff;">
            </div>

            <div class="mb-3">
                <label style="color:#aaa;">City Name</label>
                <input type="text" id="subCityInput"
                       class="form-control mt-1"
                       placeholder="e.g. Chennai"
                       style="background:#0f1923; color:white; border:1px solid #00d4ff;">
            </div>

            <div class="mb-3">
                <label style="color:#aaa;">Alert me when AQI exceeds</label>
                <input type="number" id="thresholdInput"
                       class="form-control mt-1"
                       value="100"
                       style="background:#0f1923; color:white; border:1px solid #00d4ff;">
            </div>

            <button class="btn btn-primary w-100 mt-2" onclick="subscribe()">
                🔔 Subscribe Now
            </button>

            <div id="subMessage" class="mt-3 text-center" style="display:none;">
            </div>
        </div>
    </div>
</div>

<script>
function subscribe() {
    const email = document.getElementById('emailInput').value;
    const city = document.getElementById('subCityInput').value;
    const threshold = document.getElementById('thresholdInput').value;

    if (!email || !city) {
        alert('Please fill all fields!');
        return;
    }

    fetch('/api/subscribe/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: email,
            city: city,
            threshold_aqi: threshold
        })
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById('subMessage');
        msg.style.display = 'block';
        if (data.message) {
            msg.innerHTML = `<span style="color:#00e676;">✅ ${data.message}</span>`;
        } else {
            msg.innerHTML = `<span style="color:#f44336;">❌ ${data.error}</span>`;
        }
    });
}
</script>
{% endblock %}
