{% extends 'airquality/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="card-title text-center">
                🔔 Subscribe to Air Quality Alerts
            </h4>
            <p style="color:#aaa; text-align:center;">
                Get email alerts when AQI crosses dangerous levels
            </p>
            <hr style="border-color:#00d4ff33;">

            <div class="mb-3">
                <label style="color:#aaa;">Your Email</label>
                <input type="email" id="emailInput"
                       class="form-control mt-1"
                       placeholder="you@example.com"
                       style="background:#0f1923; color:white; 
                              border:1px solid #00d4ff;">
            </div>

            <div class="mb-3">
                <label style="color:#aaa;">City Name</label>
                <input type="text" id="subCityInput"
                       class="form-control mt-1"
                       placeholder="e.g. Chennai"
                       style="background:#0f1923; color:white; 
                              border:1px solid #00d4ff;">
            </div>

            <div class="mb-3">
                <label style="color:#aaa;">Alert me when AQI exceeds</label>
                <input type="number" id="thresholdInput"
                       class="form-control mt-1"
                       value="100"
                       style="background:#0f1923; color:white; 
                              border:1px solid #00d4ff;">
            </div>

            <button class="btn btn-primary w-100 mt-2"
                    id="subscribeBtn"
                    onclick="subscribe()">
                🔔 Subscribe Now
            </button>

            <div id="loadingMsg"
                 style="display:none; text-align:center; margin-top:10px;">
                <span style="color:#00d4ff;">⏳ Please wait...</span>
            </div>

            <div id="subMessage"
                 class="mt-3 text-center"
                 style="display:none;">
            </div>
        </div>
    </div>
</div>

<script>
// Get CSRF token from cookies
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(
                    cookie.substring(name.length + 1)
                );
                break;
            }
        }
    }
    return cookieValue;
}

function subscribe() {
    const email     = document.getElementById('emailInput').value.trim();
    const city      = document.getElementById('subCityInput').value.trim();
    const threshold = document.getElementById('thresholdInput').value;

    if (!email || !city) {
        showMessage('❌ Please fill all fields!', '#f44336');
        return;
    }

    if (!email.includes('@')) {
        showMessage('❌ Please enter a valid email!', '#f44336');
        return;
    }

    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('subscribeBtn').disabled = true;
    document.getElementById('subMessage').style.display = 'none';

    const csrfToken = getCookie('csrftoken');

    fetch('/api/subscribe/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken || '',
            'X-Requested-With': 'XMLHttpRequest'
        },
        credentials: 'same-origin',
        body: JSON.stringify({
            email: email,
            city: city,
            threshold_aqi: parseFloat(threshold)
        })
    })
    .then(res => {
        if (!res.ok) {
            return res.json().then(err => {
                throw new Error(
                    err.detail || err.error || 'Server error ' + res.status
                );
            });
        }
        return res.json();
    })
    .then(data => {
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('subscribeBtn').disabled = false;

        if (data.message) {
            showMessage('✅ ' + data.message, '#00e676');
            document.getElementById('emailInput').value = '';
            document.getElementById('subCityInput').value = '';
        } else {
            showMessage(
                '❌ ' + (data.error || 'Something went wrong!'),
                '#f44336'
            );
        }
    })
    .catch(err => {
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('subscribeBtn').disabled = false;
        showMessage('❌ Error: ' + err.message, '#f44336');
        console.error('Subscribe error:', err);
    });
}

function showMessage(text, color) {
    const msg = document.getElementById('subMessage');
    msg.style.display = 'block';
    msg.innerHTML = `<span style="color:${color}; font-size:1rem;">
                        ${text}
                     </span>`;
}
</script>
{% endblock %}
